{% extends 'base.html' %}

{% block title %}Notifications{% endblock %}

{% block content %}
<div class="notifications-container">
    <div class="notifications-header">
        <h1>Notifications</h1>
        <button id="markAllReadBtn" class="btn btn-secondary">Mark All as Read</button>
    </div>

    <div class="notifications-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="unread">Unread</button>
        <button class="filter-btn" data-filter="application_status">Application Status</button>
        <button class="filter-btn" data-filter="message">Messages</button>
    </div>

    <div id="notificationsList" class="notifications-list">
        <div class="loading">Loading notifications...</div>
    </div>
</div>

<style>
.notifications-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
}

.notifications-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    border-bottom: 2px solid #e0e0e0;
    padding-bottom: 15px;
}

.notifications-header h1 {
    margin: 0;
    font-size: 28px;
    color: #333;
}

.notifications-filters {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.filter-btn {
    padding: 8px 16px;
    border: 1px solid #ddd;
    background: white;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 14px;
}

.filter-btn:hover {
    border-color: #007bff;
    color: #007bff;
}

.filter-btn.active {
    background: #007bff;
    color: white;
    border-color: #007bff;
}

.notifications-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.notification-item {
    padding: 16px;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    background: white;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
}

.notification-item:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border-color: #007bff;
}

.notification-item.unread {
    background: #f0f7ff;
    border-left: 4px solid #007bff;
}

.notification-item.unread::before {
    content: '';
    position: absolute;
    top: 12px;
    right: 12px;
    width: 8px;
    height: 8px;
    background: #007bff;
    border-radius: 50%;
}

.notification-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 8px;
}

.notification-title {
    font-weight: 600;
    color: #333;
    font-size: 16px;
    margin: 0;
}

.notification-type {
    display: inline-block;
    padding: 4px 8px;
    background: #e3f2fd;
    color: #1976d2;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
}

.notification-message {
    color: #666;
    font-size: 14px;
    margin: 8px 0;
    line-height: 1.5;
}

.notification-time {
    color: #999;
    font-size: 12px;
}

.notification-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
}

.notification-actions button {
    padding: 6px 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.3s ease;
}

.btn-read {
    background: #f0f0f0;
    color: #333;
}

.btn-read:hover {
    background: #e0e0e0;
}

.btn-delete {
    background: #ffebee;
    color: #c62828;
}

.btn-delete:hover {
    background: #ffcdd2;
}

.empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #999;
}

.empty-state-icon {
    font-size: 48px;
    margin-bottom: 16px;
}

.loading {
    text-align: center;
    padding: 40px;
    color: #999;
}

.unread-badge {
    background: #007bff;
    color: white;
    border-radius: 12px;
    padding: 2px 8px;
    font-size: 12px;
    font-weight: 600;
}
</style>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/notifications.js' %}"></script>
{% endblock %}
