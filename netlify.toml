[build]
  publish = "."

[dev]
  command = "npm run dev"
  port = 3000

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://hireconnect-9nxv.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/accounts/*"
  to = "https://hireconnect-9nxv.onrender.com/accounts/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/applications/*"
  to = "https://hireconnect-9nxv.onrender.com/applications/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/jobs/*"
  to = "https://hireconnect-9nxv.onrender.com/jobs/:splat"
  status = 200
  force = true
